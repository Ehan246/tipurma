<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign In / Sign Up | FlexExchanger</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/FKPf7xFW/Gemini-Generated-Image-797iqg797iqg797i.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { min-height: 100vh; background: linear-gradient(145deg, #0a2c26 0%, #07221e 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-container { max-width: 450px; width: 100%; }
    .auth-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .header { background: #1c2f2b; padding: 1.2rem; text-align: center; position: relative; }
    .back-btn { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.2rem; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; }
    .header h1 { color: #ffde9c; font-size: 1.3rem; }
    .form-body { padding: 1.5rem; }
    .tabs { display: flex; gap: 1rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e2ece8; }
    .tab-btn { flex: 1; background: none; border: none; padding: 0.6rem; font-size: 0.9rem; font-weight: 600; color: #7f8c8d; cursor: pointer; }
    .tab-btn.active { color: #ff6b2c; border-bottom: 2px solid #ff6b2c; margin-bottom: -2px; }
    .form { display: none; }
    .form.active { display: block; }
    .input-group { margin-bottom: 1rem; }
    .input-label { font-weight: 600; color: #1f463e; margin-bottom: 0.3rem; font-size: 0.8rem; }
    .input-wrapper { display: flex; align-items: center; background: #f9fbfa; border-radius: 1rem; border: 1.5px solid #e2ece8; }
    .input-wrapper i { padding: 0 0.8rem; color: #7f8c8d; }
    .input-wrapper input { flex: 1; border: none; background: transparent; padding: 0.7rem 0; font-size: 0.9rem; outline: none; }
    .submit-btn { width: 100%; background: #ff6b2c; border: none; padding: 0.8rem; border-radius: 1rem; font-weight: 600; font-size: 0.9rem; color: white; cursor: pointer; margin-top: 0.8rem; }
    .forgot-link { text-align: right; margin-top: 0.3rem; font-size: 0.7rem; }
    .forgot-link a { color: #ff6b2c; text-decoration: none; }
    .message { padding: 0.6rem; border-radius: 0.6rem; margin-bottom: 0.8rem; display: none; font-size: 0.75rem; }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .footer { text-align: center; padding: 0.8rem; background: #f6fcf9; color: #548c7c; font-size: 0.6rem; }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="header"><button class="back-btn" onclick="window.location.href='index.html'">←</button><h1><i class="fas fa-user-circle"></i> FlexExchanger</h1></div>
    <div class="form-body">
      <div class="tabs"><button class="tab-btn active" onclick="showTab('signin')">Sign In</button><button class="tab-btn" onclick="showTab('signup')">Sign Up</button></div>
      <div id="messageBox" class="message"></div>
      <div id="signinForm" class="form active">
        <div class="input-group"><div class="input-label">Email</div><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="signinEmail" placeholder="your@email.com"></div></div>
        <div class="input-group"><div class="input-label">Password</div><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="signinPassword" placeholder="********"></div></div>
        <div class="forgot-link"><a href="#" onclick="forgotPassword()">Forgot Password?</a></div>
        <button class="submit-btn" onclick="signIn()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </div>
      <div id="signupForm" class="form">
        <div class="input-group"><div class="input-label">Full Name</div><div class="input-wrapper"><i class="fas fa-user"></i><input type="text" id="signupName" placeholder="Your Name"></div></div>
        <div class="input-group"><div class="input-label">Email</div><div class="input-wrapper"><i class="fas fa-envelope"></i><input type="email" id="signupEmail" placeholder="your@email.com"></div></div>
        <div class="input-group"><div class="input-label">Phone</div><div class="input-wrapper"><i class="fas fa-phone"></i><input type="tel" id="signupPhone" placeholder="01xxxxxxxxx"></div></div>
        <div class="input-group"><div class="input-label">Password</div><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="signupPassword" placeholder="Min 6 characters"></div></div>
        <div class="input-group"><div class="input-label">Confirm Password</div><div class="input-wrapper"><i class="fas fa-lock"></i><input type="password" id="signupConfirmPassword" placeholder="Confirm password"></div></div>
        <button class="submit-btn" onclick="signUp()"><i class="fas fa-user-plus"></i> Sign Up</button>
      </div>
    </div>
    <div class="footer">© 2026 Flex Exchanger</div>
  </div>
</div>
<script>
  const firebaseConfig = { apiKey: "AIzaSyBm-u9hmjJtBRouEFIHifnkU_Zjn8llJqs", authDomain: "takatotaka-49555.firebaseapp.com", databaseURL: "https://takatotaka-49555-default-rtdb.firebaseio.com", projectId: "takatotaka-49555", storageBucket: "takatotaka-49555.appspot.com", messagingSenderId: "321092793137", appId: "1:321092793137:web:cc73a09d40f7c2b4eeb610" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  function showTab(tab) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.form').forEach(f=>f.classList.remove('active')); if(tab==='signin'){ document.querySelector('.tab-btn:first-child').classList.add('active'); document.getElementById('signinForm').classList.add('active'); } else { document.querySelector('.tab-btn:last-child').classList.add('active'); document.getElementById('signupForm').classList.add('active'); } hideMessage(); }
  function showMessage(t,type){ let m=document.getElementById('messageBox'); m.innerHTML=t; m.className=`message ${type}`; setTimeout(()=>{ m.className='message'; },4000); }
  function hideMessage(){ document.getElementById('messageBox').className='message'; }
  async function signUp(){ let name=document.getElementById('signupName').value.trim(); let email=document.getElementById('signupEmail').value.trim(); let phone=document.getElementById('signupPhone').value.trim(); let pwd=document.getElementById('signupPassword').value; let cpwd=document.getElementById('signupConfirmPassword').value;
    if(!name||!email||!phone||!pwd){ showMessage('❌ সব ফিল্ড পূরণ করুন!','error'); return; }
    if(pwd.length<6){ showMessage('❌ পাসওয়ার্ড ৬+ অক্ষর','error'); return; }
    if(pwd!==cpwd){ showMessage('❌ পাসওয়ার্ড মিলেনি','error'); return; }
    try{ let uc=await auth.createUserWithEmailAndPassword(email,pwd); await db.ref('users/'+uc.user.uid).set({ name, email, phone, status:'active', balance:0, createdAt:new Date().toISOString(), totalTransactions:0 }); alert('✅ Account Created!'); window.location.href='index2.html'; }
    catch(e){ showMessage('❌ '+e.message,'error'); }
  }
  async function signIn(){ let email=document.getElementById('signinEmail').value.trim(); let pwd=document.getElementById('signinPassword').value;
    if(!email||!pwd){ showMessage('❌ ইমেইল ও পাসওয়ার্ড দিন','error'); return; }
    try{ await auth.signInWithEmailAndPassword(email,pwd); alert('✅ Login Successful!'); window.location.href='index2.html'; }
    catch(e){ showMessage('❌ '+e.message,'error'); }
  }
  async function forgotPassword(){ let email=prompt('Enter your email:'); if(email){ try{ await auth.sendPasswordResetEmail(email); alert('✅ Reset link sent!'); }catch(e){ alert('❌ '+e.message); } } }
  auth.onAuthStateChanged((u)=>{ if(u && window.location.pathname.includes('auth.html')) window.location.href='index2.html'; });
</script>
</body>
</html>
