<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sign In / Sign Up | FlexExchanger</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/FKPf7xFW/Gemini-Generated-Image-797iqg797iqg797i.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { min-height: 100vh; background: linear-gradient(145deg, #0a2c26 0%, #07221e 100%); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .auth-container { max-width: 450px; width: 100%; }
    .auth-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .header { background: #1c2f2b; padding: 1.5rem; text-align: center; position: relative; }
    .back-btn { position: absolute; left: 1.5rem; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: white; font-size: 1.5rem; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; }
    .back-btn:hover { background: rgba(255,255,255,0.3); }
    .header h1 { color: #ffde9c; font-size: 1.6rem; }
    .header h1 i { color: #ff6b2c; margin-right: 0.5rem; }
    .form-body { padding: 2rem; }
    .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 2px solid #e2ece8; }
    .tab-btn { flex: 1; background: none; border: none; padding: 0.8rem; font-size: 1rem; font-weight: 600; color: #7f8c8d; cursor: pointer; transition: 0.2s; }
    .tab-btn.active { color: #ff6b2c; border-bottom: 2px solid #ff6b2c; margin-bottom: -2px; }
    .form { display: none; }
    .form.active { display: block; }
    .input-group { margin-bottom: 1.2rem; }
    .input-label { font-weight: 600; color: #1f463e; margin-bottom: 0.5rem; display: block; }
    .input-wrapper { display: flex; align-items: center; background: #f9fbfa; border-radius: 1rem; border: 1.5px solid #e2ece8; }
    .input-wrapper i { padding: 0 1rem; color: #7f8c8d; }
    .input-wrapper input { flex: 1; border: none; background: transparent; padding: 0.9rem 0; font-size: 1rem; outline: none; }
    .submit-btn { width: 100%; background: #ff6b2c; border: none; padding: 1rem; border-radius: 1rem; font-weight: 700; font-size: 1rem; color: white; cursor: pointer; margin-top: 1rem; transition: 0.2s; }
    .submit-btn:hover { background: #e55a1e; transform: scale(0.98); }
    .forgot-link { text-align: right; margin-top: 0.5rem; font-size: 0.8rem; }
    .forgot-link a { color: #ff6b2c; text-decoration: none; }
    .message { padding: 0.8rem; border-radius: 0.8rem; margin-bottom: 1rem; display: none; font-size: 0.85rem; }
    .message.success { background: #d4edda; color: #155724; display: block; }
    .message.error { background: #f8d7da; color: #721c24; display: block; }
    .footer { text-align: center; padding: 1rem; background: #f6fcf9; color: #548c7c; font-size: 0.7rem; border-top: 1px solid #e2f0ea; }
    @media (max-width: 500px) { .form-body { padding: 1.2rem; } }
  </style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='index.html'">←</button>
      <h1><i class="fas fa-user-circle"></i> Welcome to FlexExchanger</h1>
    </div>
    <div class="form-body">
      <div class="tabs">
        <button class="tab-btn active" onclick="showTab('signin')">Sign In</button>
        <button class="tab-btn" onclick="showTab('signup')">Sign Up</button>
      </div>

      <div id="messageBox" class="message"></div>

      <!-- Sign In Form -->
      <div id="signinForm" class="form active">
        <div class="input-group">
          <div class="input-label">Email Address</div>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signinEmail" placeholder="Enter your email">
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">Password</div>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="signinPassword" placeholder="Enter your password">
          </div>
        </div>
        <div class="forgot-link"><a href="#" onclick="forgotPassword()">Forgot Password?</a></div>
        <button class="submit-btn" onclick="signIn()"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </div>

      <!-- Sign Up Form -->
      <div id="signupForm" class="form">
        <div class="input-group">
          <div class="input-label">Full Name</div>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="signupName" placeholder="Enter your full name">
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">Email Address</div>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Enter your email">
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">Phone Number</div>
          <div class="input-wrapper">
            <i class="fas fa-phone"></i>
            <input type="tel" id="signupPhone" placeholder="Enter your phone number">
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">Password</div>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Create a password (min 6 characters)">
          </div>
        </div>
        <div class="input-group">
          <div class="input-label">Confirm Password</div>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupConfirmPassword" placeholder="Confirm your password">
          </div>
        </div>
        <button class="submit-btn" onclick="signUp()"><i class="fas fa-user-plus"></i> Sign Up</button>
      </div>
    </div>
    <div class="footer">© 2026 Flex Exchanger - Secure & Fast Exchange</div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBm-u9hmjJtBRouEFIHifnkU_Zjn8llJqs",
    authDomain: "takatotaka-49555.firebaseapp.com",
    databaseURL: "https://takatotaka-49555-default-rtdb.firebaseio.com",
    projectId: "takatotaka-49555",
    storageBucket: "takatotaka-49555.appspot.com",
    messagingSenderId: "321092793137",
    appId: "1:321092793137:web:cc73a09d40f7c2b4eeb610"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const database = firebase.database();

  function showTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll('.form').forEach(form => form.classList.remove('active'));
    if (tab === 'signin') {
      document.querySelector('.tab-btn:first-child').classList.add('active');
      document.getElementById('signinForm').classList.add('active');
    } else {
      document.querySelector('.tab-btn:last-child').classList.add('active');
      document.getElementById('signupForm').classList.add('active');
    }
    hideMessage();
  }

  function showMessage(text, type) {
    const msgBox = document.getElementById('messageBox');
    msgBox.innerHTML = text;
    msgBox.className = `message ${type}`;
    setTimeout(() => {
      msgBox.className = 'message';
    }, 5000);
  }

  function hideMessage() {
    document.getElementById('messageBox').className = 'message';
  }

  async function signUp() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const phone = document.getElementById('signupPhone').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('signupConfirmPassword').value;

    if (!name || !email || !phone || !password) {
      showMessage('❌ সব ফিল্ড পূরণ করুন!', 'error');
      return;
    }
    if (password.length < 6) {
      showMessage('❌ পাসওয়ার্ড কমপক্ষে ৬ অক্ষরের হতে হবে!', 'error');
      return;
    }
    if (password !== confirmPassword) {
      showMessage('❌ পাসওয়ার্ড এবং কনফার্ম পাসওয়ার্ড মিলেনি!', 'error');
      return;
    }

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;

      await database.ref('users/' + user.uid).set({
        name: name,
        email: email,
        phone: phone,
        balance: 0,
        status: 'active',
        createdAt: new Date().toISOString(),
        totalTransactions: 0
      });

      alert('✅ Account Created Successfully! Welcome to FlexExchanger!');
      window.location.href = 'index2.html';
    } catch (error) {
      let errorMsg = '';
      switch (error.code) {
        case 'auth/email-already-in-use':
          errorMsg = '❌ এই ইমেইল ইতিমধ্যে রেজিস্টার করা আছে!';
          break;
        case 'auth/invalid-email':
          errorMsg = '❌ সঠিক ইমেইল ঠিকানা দিন!';
          break;
        default:
          errorMsg = '❌ ' + error.message;
      }
      showMessage(errorMsg, 'error');
    }
  }

  async function signIn() {
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;

    if (!email || !password) {
      showMessage('❌ ইমেইল এবং পাসওয়ার্ড দিন!', 'error');
      return;
    }

    try {
      await auth.signInWithEmailAndPassword(email, password);
      alert('✅ Login Successful! Redirecting to Exchange...');
      window.location.href = 'index2.html';
    } catch (error) {
      let errorMsg = '';
      switch (error.code) {
        case 'auth/user-not-found':
          errorMsg = '❌ এই ইমেইলে কোন অ্যাকাউন্ট নেই!';
          break;
        case 'auth/wrong-password':
          errorMsg = '❌ ভুল পাসওয়ার্ড!';
          break;
        default:
          errorMsg = '❌ ' + error.message;
      }
      showMessage(errorMsg, 'error');
    }
  }

  async function forgotPassword() {
    const email = prompt('আপনার ইমেইল ঠিকানা দিন:');
    if (email) {
      try {
        await auth.sendPasswordResetEmail(email);
        alert('✅ পাসওয়ার্ড রিসেট লিংক আপনার ইমেইলে পাঠানো হয়েছে!');
      } catch (error) {
        alert('❌ ' + error.message);
      }
    }
  }

  auth.onAuthStateChanged((user) => {
    if (user && window.location.pathname.includes('auth.html')) {
      window.location.href = 'index2.html';
    }
  });
</script>
</body>
</html>
