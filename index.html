<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FlexExchanger | Bkash ↔ Nagad</title>
  <!-- Website Icon (Favicon) -->
  <link rel="icon" type="image/png" href="https://i.postimg.cc/FKPf7xFW/Gemini-Generated-Image-797iqg797iqg797i.png">
  <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/FKPf7xFW/Gemini-Generated-Image-797iqg797iqg797i.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a2c26 0%, #07221e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .main-card {
      max-width: 620px;
      width: 100%;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 3rem;
      box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .brand {
      background: #1c2f2b;
      padding: 1.5rem 2rem;
      text-align: center;
    }

    .brand h1 {
      color: #fef3df;
      font-size: 1.9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      object-fit: contain;
      vertical-align: middle;
    }

    .brand h1 span:first-child {
      background: #ff6b2c;
      padding: 0.2rem 0.8rem;
      border-radius: 60px;
      font-size: 1rem;
      color: #1e2f2c;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .brand h1 span:last-child {
      background: #0e7c6e;
      padding: 0.2rem 0.8rem;
      border-radius: 60px;
      font-size: 1rem;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .sub {
      color: #bdd9d1;
      font-size: 0.8rem;
      margin-top: 0.4rem;
    }

    .main-body {
      padding: 2rem;
    }

    .direction-options {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .option-card {
      flex: 1;
      background: white;
      border: 2px solid #e2ece8;
      border-radius: 1.5rem;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .option-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px -10px rgba(0, 0, 0, 0.2);
    }

    .option-card.selected {
      border-color: #ff6b2c;
      background: #fff9f0;
      box-shadow: 0 5px 15px rgba(255, 107, 44, 0.2);
    }

    .option-card.nagad-selected {
      border-color: #0e7c6e;
      background: #e8f5f2;
    }

    .option-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .option-icon-img {
      width: 60px;
      height: 60px;
      object-fit: contain;
      margin-bottom: 0.5rem;
    }

    .option-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.3rem;
    }

    .option-fee {
      font-size: 0.7rem;
      color: #7f8c8d;
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    .input-label {
      font-weight: 600;
      color: #1f463e;
      margin-bottom: 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .amount-wrapper {
      display: flex;
      align-items: center;
      background: #fafdfc;
      border-radius: 2rem;
      border: 1.5px solid #e2ece8;
    }

    .currency-symbol {
      padding: 0 1rem;
      font-weight: 700;
      font-size: 1.3rem;
      color: #2b6b5c;
    }

    .amount-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 1rem 0.8rem;
      font-size: 1.3rem;
      font-weight: 600;
      outline: none;
    }

    .fee-preview {
      background: #f1f8f5;
      border-radius: 1.2rem;
      padding: 1rem;
      margin: 1.2rem 0;
    }

    .fee-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }

    .total-row {
      border-top: 1px dashed #cbdcd6;
      margin-top: 0.6rem;
      padding-top: 0.6rem;
      font-weight: 800;
    }

    .confirm-btn {
      width: 100%;
      background: #ff6b2c;
      border: none;
      padding: 1rem;
      border-radius: 2rem;
      font-weight: 800;
      font-size: 1.1rem;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      cursor: pointer;
      transition: 0.2s;
      margin: 1rem 0;
    }

    .confirm-btn:hover {
      background: #e55a1e;
      transform: scale(0.98);
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      padding: 1rem;
      background: #f6fcf9;
      color: #548c7c;
      border-top: 1px solid #e2f0ea;
    }
  </style>
</head>
<body>
<div class="main-card">
  <div class="brand">
    <h1>
      <span><img src="https://i.postimg.cc/VsWR4xNj/download.png" alt="bKash" class="brand-icon" style="width: 32px; height: 32px;"> bkash</span>
      <span>⟷</span>
      <span>nagad <img src="https://i.postimg.cc/CMsNJ3KG/download-(1).png" alt="Nagad" class="brand-icon" style="width: 32px; height: 32px;"></span>
    </h1>
    <div class="sub">সরাসরি এক্সচেঞ্জ • নির্ভরযোগ্য হার</div>
  </div>

  <div class="main-body">
    <div class="direction-options">
      <div class="option-card" id="bkashToNagadOption">
        <div class="option-icon">
          <img src="https://i.postimg.cc/VsWR4xNj/download.png" alt="bKash" class="option-icon-img" style="width: 50px; height: 50px;">
        </div>
        <div class="option-title">Bkash → Nagad</div>
        <div class="option-fee">ফি: 1.49% + 10 TK</div>
      </div>
      <div class="option-card" id="nagadToBkashOption">
        <div class="option-icon">
          <img src="https://i.postimg.cc/CMsNJ3KG/download-(1).png" alt="Nagad" class="option-icon-img" style="width: 50px; height: 50px;">
        </div>
        <div class="option-title">Nagad → Bkash</div>
        <div class="option-fee">ফি: 1.25% + 10 TK</div>
      </div>
    </div>

    <div class="input-group">
      <div class="input-label">
        <span>💰</span> <span id="sendFromLabel">Bkash থেকে পাঠাবেন</span>
      </div>
      <div class="amount-wrapper">
        <span class="currency-symbol">৳</span>
        <input type="number" id="amountInput" placeholder="পরিমাণ লিখুন" value="500" step="any">
      </div>
    </div>

    <div class="fee-preview" id="feePreview">
      <div class="fee-row">
        <span>এক্সচেঞ্জ পরিমাণ:</span>
        <span id="displayAmount">0.00 ৳</span>
      </div>
      <div class="fee-row">
        <span id="feeLabel">ফি (1.49% + 10 TK):</span>
        <span id="feeAmount">0.00 ৳</span>
      </div>
      <div class="fee-row total-row">
        <span>✅ পাবেন:</span>
        <span id="receiveAmount">0.00 ৳</span>
      </div>
    </div>

    <button class="confirm-btn" id="confirmExchangeBtn">
      <span>🔄</span> কনফার্ম করুন & এক্সচেঞ্জ করুন
    </button>
  </div>
  <footer>
    ⚡ Bkash→Nagad: 1.49%+10 | Nagad→Bkash: 1.25%+10
  </footer>
</div>

<script>
  let currentDirection = 'bkash_to_nagad';

  const bkashOption = document.getElementById('bkashToNagadOption');
  const nagadOption = document.getElementById('nagadToBkashOption');
  const amountInput = document.getElementById('amountInput');
  const sendFromLabel = document.getElementById('sendFromLabel');
  const displayAmountSpan = document.getElementById('displayAmount');
  const feeAmountSpan = document.getElementById('feeAmount');
  const receiveAmountSpan = document.getElementById('receiveAmount');
  const feeLabel = document.getElementById('feeLabel');
  const confirmBtn = document.getElementById('confirmExchangeBtn');

  function getFeeConfig(direction) {
    if (direction === 'bkash_to_nagad') {
      return { percent: 1.49, fixed: 10, name: 'Bkash → Nagad', sendFrom: 'Bkash', receiveTo: 'Nagad' };
    } else {
      return { percent: 1.25, fixed: 10, name: 'Nagad → Bkash', sendFrom: 'Nagad', receiveTo: 'Bkash' };
    }
  }

  function getFeeBreakdown(amount, direction) {
    if (isNaN(amount) || amount <= 0) {
      return { totalFee: 0, received: 0 };
    }
    const config = getFeeConfig(direction);
    const percentFee = (amount * config.percent) / 100;
    const totalFee = percentFee + config.fixed;
    let received = amount - totalFee;
    if (received < 0) received = 0;
    return { totalFee, received };
  }

  function updatePreview() {
    let amount = parseFloat(amountInput.value);
    if (isNaN(amount)) amount = 0;
    if (amount < 0) amount = 0;

    displayAmountSpan.innerText = amount.toFixed(2) + ' ৳';
    const breakdown = getFeeBreakdown(amount, currentDirection);
    feeAmountSpan.innerText = breakdown.totalFee.toFixed(2) + ' ৳';
    receiveAmountSpan.innerText = breakdown.received.toFixed(2) + ' ৳';
  }

  function updateDirectionUI() {
    if (currentDirection === 'bkash_to_nagad') {
      bkashOption.classList.add('selected');
      bkashOption.classList.remove('nagad-selected');
      nagadOption.classList.remove('selected');
      sendFromLabel.innerText = 'Bkash থেকে পাঠাবেন';
      feeLabel.innerHTML = '📉 ফি (1.49% + 10 TK):';
    } else {
      nagadOption.classList.add('selected');
      nagadOption.classList.add('nagad-selected');
      bkashOption.classList.remove('selected');
      sendFromLabel.innerText = 'Nagad থেকে পাঠাবেন';
      feeLabel.innerHTML = '📉 ফি (1.25% + 10 TK):';
    }
    updatePreview();
  }

  function performExchange() {
    let amount = parseFloat(amountInput.value);
    
    if (isNaN(amount) || amount <= 0) {
      alert('❌ সঠিক পরিমাণ লিখুন!');
      return;
    }
    
    if (amount < 10) {
      alert('❌ নূন্যতম এক্সচেঞ্জ পরিমাণ ১০ টাকা');
      return;
    }
    
    if (amount > 500000) {
      alert('⚠️ সর্বোচ্চ সীমা 500,000 টাকা');
      return;
    }
    
    const config = getFeeConfig(currentDirection);
    const breakdown = getFeeBreakdown(amount, currentDirection);
    
    if (breakdown.received <= 0 && amount > 0) {
      if (!confirm(`⚠️ ফি কাটার পরে আপনি ${breakdown.received.toFixed(2)} টাকা পাবেন। তবুও কি এক্সচেঞ্জ চালিয়ে যাবেন?`)) {
        return;
      }
    }
    
    const exchangeData = {
      amount: amount,
      received: breakdown.received,
      fee: breakdown.totalFee,
      direction: currentDirection,
      sendFrom: config.sendFrom,
      receiveTo: config.receiveTo,
      feePercent: config.percent,
      feeFixed: config.fixed,
      timestamp: new Date().toISOString()
    };
    
    localStorage.setItem('pendingExchange', JSON.stringify(exchangeData));
    
    if (currentDirection === 'bkash_to_nagad') {
      window.location.href = 'bkash-to-nagad.html';
    } else {
      window.location.href = 'nagad-to-bkash.html';
    }
  }
  
  bkashOption.addEventListener('click', () => {
    currentDirection = 'bkash_to_nagad';
    updateDirectionUI();
  });
  
  nagadOption.addEventListener('click', () => {
    currentDirection = 'nagad_to_bkash';
    updateDirectionUI();
  });
  
  amountInput.addEventListener('input', updatePreview);
  confirmBtn.addEventListener('click', performExchange);
  
  updateDirectionUI();
</script>
