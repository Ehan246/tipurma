<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Dashboard | FlexExchanger</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/FKPf7xFW/Gemini-Generated-Image-797iqg797iqg797i.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: linear-gradient(145deg, #0a2c26 0%, #07221e 100%); min-height: 100vh; padding: 1rem; }
    .dashboard-container { max-width: 1100px; margin: 0 auto; }
    .header { background: #1c2f2b; border-radius: 1.2rem; padding: 0.8rem 1.2rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem; }
    .header h1 { color: #ffde9c; font-size: 1.2rem; }
    .user-info { display: flex; align-items: center; gap: 0.8rem; }
    .user-name { color: white; font-weight: 600; font-size: 0.85rem; }
    .logout-btn, .exchange-btn { background: #ff6b2c; border: none; padding: 0.4rem 0.8rem; border-radius: 1.5rem; color: white; cursor: pointer; font-size: 0.75rem; text-decoration: none; display: inline-block; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.8rem; margin-bottom: 1rem; }
    .stat-card { background: white; border-radius: 1rem; padding: 0.8rem; text-align: center; }
    .stat-card i { font-size: 1.5rem; color: #ff6b2c; margin-bottom: 0.3rem; }
    .stat-number { font-size: 1.3rem; font-weight: 800; color: #1f5a4c; }
    .stat-label { font-size: 0.7rem; color: #7f8c8d; }
    .panel { background: white; border-radius: 1.2rem; padding: 1rem; margin-bottom: 1rem; }
    .panel h2 { color: #1f5a4c; margin-bottom: 0.8rem; font-size: 1rem; border-left: 3px solid #ff6b2c; padding-left: 0.8rem; }
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #e2ece8; font-size: 0.75rem; }
    th { background: #f1f8f5; color: #1f5a4c; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; }
    .status-completed { background: #d4edda; color: #155724; }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-failed { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
<div class="dashboard-container">
  <div class="header"><h1><i class="fas fa-chart-line"></i> My Dashboard</h1><div class="user-info"><span class="user-name" id="userName">Loading...</span><a href="index2.html" class="exchange-btn"><i class="fas fa-exchange-alt"></i> Exchange</a><button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>
  <div class="stats-grid"><div class="stat-card"><i class="fas fa-exchange-alt"></i><div class="stat-number" id="totalTransactions">0</div><div class="stat-label">মোট লেনদেন</div></div><div class="stat-card"><i class="fas fa-money-bill"></i><div class="stat-number" id="totalAmount">0</div><div class="stat-label">মোট এক্সচেঞ্জ</div></div><div class="stat-card"><i class="fas fa-clock"></i><div class="stat-number" id="pendingCount">0</div><div class="stat-label">Pending</div></div><div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-number" id="completedCount">0</div><div class="stat-label">Completed</div></div></div>
  <div class="panel"><h2><i class="fas fa-history"></i> My Transactions</h2><div class="table-container"> <table><thead><tr><th>Type</th><th>Amount</th><th>Received</th><th>TrxID</th><th>Status</th><th>Date</th></tr></thead><tbody id="transactionsList"><tr><td colspan="6" style="text-align:center;"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr></tbody></table></div></div>
</div>
<script>
  const firebaseConfig = { apiKey: "AIzaSyBm-u9hmjJtBRouEFIHifnkU_Zjn8llJqs", authDomain: "takatotaka-49555.firebaseapp.com", databaseURL: "https://takatotaka-49555-default-rtdb.firebaseio.com", projectId: "takatotaka-49555", storageBucket: "takatotaka-49555.appspot.com", messagingSenderId: "321092793137", appId: "1:321092793137:web:cc73a09d40f7c2b4eeb610" };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();
  let currentUser = null, userTxns = [];
  auth.onAuthStateChanged(async (user) => { if(!user){ window.location.href='index.html'; return; } currentUser=user; const snap=await db.ref('users/'+user.uid).once('value'); document.getElementById('userName').innerHTML=`<i class="fas fa-user-circle"></i> ${snap.val()?.name || user.email.split('@')[0]}`; loadTransactions(); });
  async function loadTransactions(){ const snap=await db.ref('transactions').once('value'); const data=snap.val(); userTxns=[]; if(data){ Object.keys(data).forEach(k=>{ if(data[k].userId===currentUser.uid) userTxns.push({id:k,...data[k]}); }); userTxns.sort((a,b)=>(b.timestamp||0)-(a.timestamp||0)); } updateStats(); displayTxns(); }
  function updateStats(){ const total=userTxns.length; const comp=userTxns.filter(t=>t.status==='completed').length; const pend=userTxns.filter(t=>t.status==='pending'||!t.status).length; const amt=userTxns.reduce((s,t)=>s+(t.amount||0),0); document.getElementById('totalTransactions').innerText=total; document.getElementById('totalAmount').innerText=amt.toFixed(2); document.getElementById('pendingCount').innerText=pend; document.getElementById('completedCount').innerText=comp; }
  function displayTxns(){ const tbody=document.getElementById('transactionsList'); if(!tbody) return; if(userTxns.length===0){ tbody.innerHTML='<tr><td colspan="6" style="text-align:center;">📭 No transactions</td></tr>'; return; } tbody.innerHTML=userTxns.slice(0,15).map(t=>{ const dir=t.direction||(t.type==='bkash_to_nagad'?'Bkash→Nagad':'Nagad→Bkash'); const st=t.status||'pending'; const dt=t.timestamp?new Date(t.timestamp).toLocaleString():new Date().toLocaleString(); return `<tr><td>${dir}</td><td>${(t.amount||0).toFixed(2)} ৳</td><td>${(t.received||0).toFixed(2)} ৳</td><td><small>${t.trxId||'-'}</small></td><td><span class="status-badge status-${st}">${st==='pending'?'Pending':(st==='completed'?'Completed':'Failed')}</span></td><td><small>${dt}</small></td></tr>`; }).join(''); }
  function logout(){ auth.signOut().then(()=>window.location.href='index.html'); }
</script>
</body>
</html>
